<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Rubato Notes</title>
    <meta name="theme-color" content="#231F20">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rubato Notes">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="TemplateData/icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="TemplateData/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      #unity-runtime-log {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 116px;
        z-index: 30;
        max-height: 34vh;
        overflow: auto;
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(16, 12, 18, 0.92);
        color: #f5efe6;
        font: 12px/1.45 Menlo, Monaco, Consolas, monospace;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(12px);
      }

      #unity-runtime-log[hidden] {
        display: none;
      }

      #unity-runtime-log strong {
        display: block;
        margin-bottom: 6px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ffb86b;
      }

      .unity-runtime-log-entry + .unity-runtime-log-entry {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .unity-runtime-log-entry-type {
        color: #ff8d8d;
        font-weight: 700;
      }

      .unity-runtime-log-entry-stack {
        white-space: pre-wrap;
        opacity: 0.78;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar" aria-live="polite">
        <div id="unity-logo" role="img" aria-label="Rubato Notes"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <p id="unity-loading-text">Preparing your performance...</p>
      </div>
      <div id="unity-warning"></div>
      <section id="unity-runtime-log" hidden aria-live="polite">
        <strong>Runtime Diagnostics</strong>
        <div id="unity-runtime-log-entries"></div>
      </section>
      <aside id="install-hint" hidden>
        <div class="install-hint-card">
          <div class="install-hint-copy">
            <strong>Install on iPhone</strong>
            <span>Share -> Add to Home Screen -> Open as Web App</span>
          </div>
          <button id="install-hint-close" type="button" aria-label="Dismiss install tip">Later</button>
        </div>
      </aside>
    </div>
    <script>
      const installHintStorageKey = "rubato-install-hint-v1";
      const assetVersion = "debug-" + Date.now().toString(36);

      function isAppleMobile() {
        return /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      }

      function isStandaloneMode() {
        return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
      }

      function withVersion(url) {
        const separator = url.includes("?") ? "&" : "?";
        return `${url}${separator}v=${encodeURIComponent(assetVersion)}`;
      }

      async function clearLegacyWebAppState() {
        if ("serviceWorker" in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            const currentScope = new URL("./", window.location.href).href;
            await Promise.all(registrations
              .filter((registration) => registration.scope.startsWith(currentScope))
              .map((registration) => registration.unregister()));
          } catch (error) {
            console.warn("Service worker cleanup failed.", error);
          }
        }

        if ("caches" in window) {
          try {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys
              .filter((key) =>
                key.includes("private-pwa") ||
                key.includes("Rubato Notes") ||
                key.includes("KorIsDeveloping"))
              .map((key) => caches.delete(key)));
          } catch (error) {
            console.warn("Cache cleanup failed.", error);
          }
        }

        if ("indexedDB" in window) {
          try {
            indexedDB.deleteDatabase("UnityCache");
          } catch (error) {
            console.warn("IndexedDB cache cleanup failed.", error);
          }
        }
      }

      function setupInstallHint() {
        const installHint = document.getElementById("install-hint");
        const closeButton = document.getElementById("install-hint-close");
        if (!installHint || !closeButton) return;

        closeButton.addEventListener("click", () => {
          installHint.hidden = true;
          try {
            localStorage.setItem(installHintStorageKey, "dismissed");
          } catch (error) {
          }
        });

        if (!isAppleMobile() || isStandaloneMode())
          return;

        try {
          if (localStorage.getItem(installHintStorageKey) === "dismissed")
            return;
        } catch (error) {
        }

        installHint.hidden = false;
      }

      clearLegacyWebAppState();

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const warningBanner = document.querySelector("#unity-warning");
      const runtimeLog = document.querySelector("#unity-runtime-log");
      const runtimeLogEntries = document.querySelector("#unity-runtime-log-entries");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        const div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type === "error") {
          div.className = "unity-banner unity-banner-error";
        } else {
          div.className = type === "warning" ? "unity-banner unity-banner-warning" : "unity-banner";
          setTimeout(function() {
            if (warningBanner.contains(div)) {
              warningBanner.removeChild(div);
              updateBannerVisibility();
            }
          }, 5000);
        }
        updateBannerVisibility();
      }

      window.__rubatoReportError = (message) => {
        const safeMessage = String(message).replace(/\n/g, "<br>");
        unityShowBanner(safeMessage, "error");
      };

      function appendRuntimeEntry(type, message, stack = "") {
        if (!runtimeLog || !runtimeLogEntries)
          return;

        runtimeLog.hidden = false;

        const entry = document.createElement("div");
        entry.className = "unity-runtime-log-entry";

        const typeLine = document.createElement("div");
        typeLine.className = "unity-runtime-log-entry-type";
        typeLine.textContent = type;
        entry.appendChild(typeLine);

        const messageLine = document.createElement("div");
        messageLine.textContent = message;
        entry.appendChild(messageLine);

        if (stack) {
          const stackLine = document.createElement("pre");
          stackLine.className = "unity-runtime-log-entry-stack";
          stackLine.textContent = stack;
          entry.appendChild(stackLine);
        }

        runtimeLogEntries.prepend(entry);
        while (runtimeLogEntries.children.length > 6)
          runtimeLogEntries.removeChild(runtimeLogEntries.lastChild);
      }

      window.__rubatoAppendUnityLog = (message, stack, type) => {
        appendRuntimeEntry(type || "Unity", String(message || ""), String(stack || ""));
      };

      window.addEventListener("error", (event) => {
        const error = event.error;
        const message = error && error.message ? error.message : (event.message || "Unknown browser error");
        const stack = error && error.stack ? error.stack : "";
        appendRuntimeEntry("Browser Error", message, stack);
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason;
        const message = typeof reason === "string"
          ? reason
          : (reason && reason.message) || "Unhandled promise rejection";
        const stack = reason && reason.stack ? reason.stack : "";
        appendRuntimeEntry("Promise Rejection", message, stack);
      });

      const buildUrl = "Build";
      const loaderUrl = withVersion(buildUrl + "/WebGLPrivatePwaGitHubPages.loader.js");
      const config = {
        arguments: [],
        dataUrl: withVersion(buildUrl + "/WebGLPrivatePwaGitHubPages.data.unityweb"),
        frameworkUrl: withVersion(buildUrl + "/WebGLPrivatePwaGitHubPages.framework.js.unityweb"),
        codeUrl: withVersion(buildUrl + "/WebGLPrivatePwaGitHubPages.wasm.unityweb"),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "KorIsDeveloping",
        productName: "Rubato Notes",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      document.body.style.touchAction = "none";
      canvas.style.touchAction = "none";

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);
      }


      loadingBar.style.display = "grid";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          setupInstallHint();
        }).catch((message) => {
          unityShowBanner(message, "error");
        });
      };
      script.onerror = () => {
        unityShowBanner("The game files could not be loaded. Please refresh and try again.", "error");
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
